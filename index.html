<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hello Kitty Calculator</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
    </head>
    <body>
        <div class="calculator">
            <button id="close-btn" class="window-btn">✕</button>
            <div class="decorations">
                <img src="images/hellokitty.png" alt="Hello Kitty" class="kitty" />
                <img src="images/bow.png" alt="Bow" class="bow" />
                <img src="images/hearts1.png" alt="hearts" class="hearts1" />
                <img src="images/hearts2.png" alt="hearts" class="hearts2" />
                <img src="images/hearts3.png" alt="hearts" class="hearts3" />
            </div>

            <div class="display">
                <div id="equation" class="equation"></div>
                <div id="result" class="result">0</div>
            </div>

            <div class="buttons">
                <button class="btn ac" data-value="AC">
                    <img src="images/ac.png" alt="AC" />
                </button>

                <button class="btn backspace" data-value="BACK">
                    <img src="images/backspace.png" alt="Backspace" />
                </button>

                <button class="btn" data-value="+/-">
                    <img src="images/plusminus.png" alt="+/-" />
                </button>

                <button class="btn operator" data-value="/">
                    <img src="images/divide.png" alt="/" />
                </button>

                <button class="btn" data-value="7">
                    <img src="images/7.png" alt="7" />
                </button>
                <button class="btn" data-value="8">
                    <img src="images/8.png" alt="8" />
                </button>
                <button class="btn" data-value="9">
                    <img src="images/9.png" alt="9" />
                </button>
                <button class="btn operator" data-value="X">
                    <img src="images/multiply.png" alt="X" />
                </button>

                <button class="btn" data-value="6">
                    <img src="images/6.png" alt="6" />
                </button>
                <button class="btn" data-value="5">
                    <img src="images/5.png" alt="5" />
                </button>
                <button class="btn" data-value="4">
                    <img src="images/4.png" alt="4" />
                </button>
                <button class="btn operator" data-value="-">
                    <img src="images/minus.png" alt="-" />
                </button>

                <button class="btn" data-value="3">
                    <img src="images/3.png" alt="3" />
                </button>
                <button class="btn" data-value="2">
                    <img src="images/2.png" alt="2" />
                </button>
                <button class="btn" data-value="1">
                    <img src="images/1.png" alt="1" />
                </button>
                <button class="btn operator" data-value="+">
                    <img src="images/plus.png" alt="+" />
                </button>

                <button class="btn wide" data-value="0">
                    <img src="images/0.png" alt="0" />
                </button>
                <button class="btn" data-value=".">
                    <img src="images/dot.png" alt="." />
                </button>
                <button class="btn equals" data-value="=">
                    <img src="images/equals.png" alt="=" />
                </button>
            </div>
        </div>

        <script src="script.js">

        </script>
    </body>
</html>
